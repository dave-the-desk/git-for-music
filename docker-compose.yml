x-web-image: &web_image git-for-music-web
x-web-build: &web_build
  context: .
  dockerfile: apps/web/Dockerfile
x-daw-db-url: &daw_db_url postgresql://postgres:postgres@postgres:5432/git_for_music
x-daw-web-url: &daw_web_url http://web:3000
x-daw-asset-secret: &daw_asset_secret dev-only-daw-asset-token-secret
x-daw-worker-secret: &daw_worker_secret dev-only-daw-worker-callback-secret

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: git_for_music
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d git_for_music"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-init:
    image: *web_image
    build: *web_build
    command:
      - pnpm
      - --filter
      - "@git-for-music/db"
      - exec
      - prisma
      - db
      - push
      - --accept-data-loss
    environment:
      DATABASE_URL: *daw_db_url
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: *web_image
    build: *web_build
    restart: unless-stopped
    environment:
      DATABASE_URL: *daw_db_url
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DAW_ASSET_UPLOAD_TOKEN_SECRET: *daw_asset_secret
      DAW_WORKER_CALLBACK_SECRET: *daw_worker_secret
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/web/public:/app/apps/web/public

  audio-worker:
    build:
      context: ./workers/audio
    restart: unless-stopped
    environment:
      DATABASE_URL: *daw_db_url
      POLL_INTERVAL_SECONDS: "2"
      WEB_PUBLIC_DIR: /app/apps/web/public
      DAW_WEB_APP_URL: *daw_web_url
      DAW_WORKER_CALLBACK_SECRET: *daw_worker_secret
    depends_on:
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/web/public:/app/apps/web/public

volumes:
  postgres_data:
  redis_data:
