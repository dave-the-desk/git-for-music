x-web-image: &web_image git-for-music-web
x-web-build: &web_build
  context: .
  dockerfile: src/Dockerfile
x-daw-db-url: &daw_db_url postgresql://postgres:postgres@postgres:5432/git_for_music
x-daw-asset-secret: &daw_asset_secret dev-only-daw-asset-token-secret
x-daw-worker-secret: &daw_worker_secret dev-only-daw-worker-callback-secret
x-object-storage-bucket: &object_storage_bucket git-for-music
x-object-storage-access-key: &object_storage_access_key minioadmin
x-object-storage-secret-key: &object_storage_secret_key minioadmin123
x-object-storage-region: &object_storage_region us-east-1
x-object-storage-public-url: &object_storage_public_url http://localhost:9000
x-object-storage-internal-url: &object_storage_internal_url http://minio:9000

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: git_for_music
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d git_for_music"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: *object_storage_access_key
      MINIO_ROOT_PASSWORD: *object_storage_secret_key
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: *object_storage_access_key
      MINIO_ROOT_PASSWORD: *object_storage_secret_key
      OBJECT_STORAGE_BUCKET_NAME: *object_storage_bucket
    entrypoint: ["/bin/sh", "-lc"]
    command: |
      until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
        sleep 1
      done
      mc mb --ignore-existing "local/$${OBJECT_STORAGE_BUCKET_NAME}"
      cat <<'EOF' >/tmp/minio-cors.xml
      <CORSConfiguration>
        <CORSRule>
          <AllowedOrigin>http://localhost:3000</AllowedOrigin>
          <AllowedOrigin>http://127.0.0.1:3000</AllowedOrigin>
          <AllowedMethod>GET</AllowedMethod>
          <AllowedMethod>PUT</AllowedMethod>
          <AllowedMethod>HEAD</AllowedMethod>
          <AllowedHeader>*</AllowedHeader>
          <ExposeHeader>ETag</ExposeHeader>
          <MaxAgeSeconds>3600</MaxAgeSeconds>
        </CORSRule>
      </CORSConfiguration>
      EOF
      mc cors set "local/$${OBJECT_STORAGE_BUCKET_NAME}" /tmp/minio-cors.xml

  db-init:
    image: *web_image
    build: *web_build
    command:
      - pnpm
      - --filter
      - "@git-for-music/db"
      - migrate:deploy
    environment:
      DATABASE_URL: *daw_db_url
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: *web_image
    build: *web_build
    restart: unless-stopped
    environment:
      DATABASE_URL: *daw_db_url
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      DAW_ASSET_UPLOAD_TOKEN_SECRET: *daw_asset_secret
      DAW_WORKER_CALLBACK_SECRET: *daw_worker_secret
      OBJECT_STORAGE_BUCKET_NAME: *object_storage_bucket
      OBJECT_STORAGE_ACCESS_KEY_ID: *object_storage_access_key
      OBJECT_STORAGE_SECRET_ACCESS_KEY: *object_storage_secret_key
      OBJECT_STORAGE_REGION: *object_storage_region
      OBJECT_STORAGE_PUBLIC_URL: *object_storage_public_url
      OBJECT_STORAGE_INTERNAL_URL: *object_storage_internal_url
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      minio-init:
        condition: service_completed_successfully
      db-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
